# Holiday CN Java - Default Configuration
# Override by placing holiday-config.properties on classpath or providing an external path

# Region identifier (short form).
# Internally mapped to "calendar-{region}" for classpath and disk cache directories.
# Examples: cn (mainland China), cn-tw (Taiwan), cn-hk (Hong Kong), sg (Singapore)
data-store.region=cn

# Base directory for storing holiday data files and metadata.
# Actual data is stored in {dir}/calendar-{region}/ to isolate regions.
data-store.dir=./holiday-data

# Off-day calculation strategy for years without data files: WEEKEND_ONLY | FESTIVAL
data-calc.fallback.strategy=WEEKEND_ONLY

# ─── Data File Update Strategy ───
# Controls how and when data files are downloaded from remote sources.

# Enable or disable cron-based periodic data download.
# Set to false to disable automatic updates (manual refresh() still works).
data-file.update.enabled=true

# Download schedule as a Quartz cron expression (6 fields: second minute hour day-of-month month day-of-week).
# Default: every 1st, 11th, 21st of November and December at 02:00.
# Use ? for either day-of-month or day-of-week (Quartz requirement).
data-file.update.cron=0 0 2 1,11,21 11,12 ?

# Remote data source URL templates (comma-separated).
# Each URL should contain ${yyyy} as a year placeholder.
# For each year, URLs are tried in order; the first successful fetch stops further attempts.
data-file.update.source.urls=https://github.com/d2yh/holiday-cn-java/tree/main/src/main/resources/calendar-cn/${yyyy}.json

# Year boundary: fetch current year, all years >= this value, and years with cached data on disk.
data-file.update.source.years-after=2026

# URL attempt order: sequential (try in listed order) | random (shuffle before each year)
data-file.update.source.url-order=sequential

# ─── Data File Loader Strategy ───
# Controls how data files are loaded from local sources (classpath, disk) and patched.

# Patch file suffix names (comma-separated). For each year, loads {year}-{suffix}.json in order.
# Each patch overlays on top of the previous data (same date overrides, new dates appended).
# Example: ext,company -> loads 2025-ext.json then 2025-company.json
data-file.loader.ext.suffixes=ext

# Classpath resource prefix for bundled holiday data.
# By default auto-derived from region as calendar-{region}/
# Override this only if your resource layout differs from the convention.
data-file.loader.classpath.prefix=
